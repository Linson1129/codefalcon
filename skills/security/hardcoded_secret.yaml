name: hardcoded_secret
description: 检测代码中的硬编码密钥、密码、Token
category: security
severity: error
pattern: |-
  (?i)(api[_-]?key|password|passwd|pwd|secret|token|auth)\s*[:=]\s*["'][^"']{8,}["']
llm_prompt: |
  请重点检查代码中是否存在硬编码的敏感信息，包括：
  - API Key、Secret Key、Access Token
  - 数据库密码、用户密码
  - 加密密钥、私钥文件内容
  这些应该通过环境变量或密钥管理服务获取。
suggestion_template: '发现可能的硬编码敏感信息: {match}，请使用环境变量或密钥管理服务'
enabled: true
